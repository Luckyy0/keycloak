version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: keycloak-db-prod
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    networks:
      - kc-net

  keycloak-node1:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak-node1
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_PROXY_HEADERS: xforwarded
      KC_CACHE_STACK: tcp
      JGROUPS_DISCOVERY_PROTOCOL: JDBC_PING
      JGROUPS_DISCOVERY_PROPERTIES: "datasource_jndi_name=java:jboss/datasources/KeycloakDS"
    command: 
      - start-dev # Vẫn dùng dev để giảm bớt config TLS, nhưng đã bật lưới clustering
      - --http-port=8080
    depends_on:
      - postgres
    networks:
      - kc-net

  keycloak-node2:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak-node2
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_PROXY_HEADERS: xforwarded
      KC_CACHE_STACK: tcp
      JGROUPS_DISCOVERY_PROTOCOL: JDBC_PING
      JGROUPS_DISCOVERY_PROPERTIES: "datasource_jndi_name=java:jboss/datasources/KeycloakDS"
    command: 
      - start-dev
      - --http-port=8080
    depends_on:
      - postgres
    networks:
      - kc-net

  nginx:
    image: nginx:latest
    container_name: keycloak-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - keycloak-node1
      - keycloak-node2
    networks:
      - kc-net

networks:
  kc-net:
    driver: bridge
