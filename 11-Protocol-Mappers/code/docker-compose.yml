version: '3.8'

services:
  postgres_db_mappers:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    networks:
      - mappers-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  kc_mappers_server:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db_mappers:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # LỆNH ĐÁNH THỨC CỖ MÁY JAVASCRIPT BỊ PHONG ẤN BỞI REDHAT
      KC_FEATURES: scripts
    ports:
      - "8080:8080"
    depends_on:
      postgres_db_mappers:
        condition: service_healthy
    networks:
      - mappers-network

networks:
  mappers-network:
    driver: bridge
