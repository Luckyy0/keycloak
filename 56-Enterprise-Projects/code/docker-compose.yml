version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: neobank-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - keycloak-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  openldap:
    image: osixia/openldap:1.5.0
    container_name: neobank-openldap
    environment:
      LDAP_ORGANISATION: "NeoBank"
      LDAP_DOMAIN: "neobank.com"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
      - "636:636"
    networks:
      - keycloak-network
    command: ["--copy-service"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: neobank-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - openldap
    networks:
      - keycloak-network

  bff-gateway:
    image: nginx:alpine
    container_name: neobank-bff
    # Nginx is used here as a placeholder for a Spring Cloud Gateway BFF
    # In a real environment, this would be a Spring Boot JAR
    ports:
      - "8081:80"
    networks:
      - keycloak-network

  resource-server:
    image: nginx:alpine
    container_name: neobank-resource-server
    # Placeholder for Spring Boot Resource Server
    ports:
      - "8082:80"
    networks:
      - keycloak-network

networks:
  keycloak-network:
    driver: bridge

volumes:
  postgres_data:
