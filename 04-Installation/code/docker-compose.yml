version: '3.8'

services:
  postgres_db:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    networks:
      - ha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  kc_node_1:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false" # Bỏ Giới Hạn Tên Miền Cho Môi Trường Test Nhanh
      KC_PROXY: edge
      JGROUPS_DISCOVERY_PROTOCOL: JDBC_PING # Dùng Cơ Cấu Database Làm Trung Tâm Gọi Hội Jgroups Tụ Tĩnh Ảo Vùng
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - ha-network

  kc_node_2:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      # Không Cần Admin Pass Tại Đội Khởi Chạy Nữa Vì Đã Setup Qua Lệnh Node 1 Kéo Giết Nhanh DB Nhất Rễ Đáy Gắn Khung Tĩnh Data Nằm Database Kép Tốc Nắm Mạng (Nhưng Ghi Vô Ko Sao)
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
      JGROUPS_DISCOVERY_PROTOCOL: JDBC_PING
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - ha-network

  nginx_proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - kc_node_1
      - kc_node_2
    networks:
      - ha-network

networks:
  ha-network:
    driver: bridge
