version: '3.8'

services:
  postgres_db_users:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    networks:
      - users-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025" # Web Lệnh Kéo Cáp OIDC Kẽ Giao Diện Thư Gửi Khách Nhựa Bọc Kép
      # Port 1025 Mặc Định Đáy Lệnh Kéo Cụt Oanh Dành Cho Giao Thức SMTP Bơm Máu Khung Oanh (Không Cần Bind Host)
    networks:
      - users-network

  kc_users_server:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev # Chạy Dev Mode Giao Cấp Chặn Code Nhanh Mạch Đáy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_db_users:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Bật Đáy Mạch User Profile Mặc Định Lệnh Rìa Kéo Cáp Ở Bản 24
    ports:
      - "8080:8080"
    depends_on:
      postgres_db_users:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - users-network

networks:
  users-network:
    driver: bridge
